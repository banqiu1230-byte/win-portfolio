<!doctype html>
<html lang="zh-CN" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      @font-face { font-family: "PingFang SC"; src: local("PingFang SC"); }
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 1920px; height: 1080px; overflow: hidden; background: #f2f1ee; }
      body { font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif; color: #1e1d1b; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background: #f2f1ee; }
      #root::before {
        content: "";
        position: absolute;
        inset: -28%;
        background: radial-gradient(circle at 72% 55%, rgba(255,106,0,.12), transparent 26%);
      }
      .clip { visibility: hidden; }
      .composition { position: absolute; inset: 0; overflow: hidden; }
      .ui-streams { position: absolute; inset: -220px 24px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px; }
      .stream { display: flex; flex-direction: column; gap: 24px; will-change: transform, opacity; }
      .stream:nth-child(even) { transform: translateY(-390px); }
      .screen {
        flex: 0 0 auto;
        width: 100%;
        height: 690px;
        padding: 22px 12px;
        border: 0;
        border-radius: 16px;
        background: #fff;
        box-shadow: none;
        overflow: hidden;
      }
      .screen img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 8px; background: #fff; }
      .brand-stage { position: absolute; inset: 0; display: grid; place-items: center; opacity: 0; }
      .brand-card { display: flex; flex-direction: column; align-items: center; gap: 42px; text-align: center; }
      .brand-logo-window { width: 250px; height: 250px; overflow: hidden; border-radius: 58px; box-shadow: 0 30px 76px rgba(255,106,0,.18); }
      .brand-logo { width: 310px; height: 310px; margin: -30px; display: block; }
      .brand-word { display: flex; gap: 26px; margin: 0; font-size: 64px; line-height: 1; letter-spacing: .04em; font-weight: 600; }
      .brand-letter { display: inline-block; opacity: 0; will-change: transform, opacity; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="11.5" data-width="1920" data-height="1080">
      <div id="scene" class="clip composition" data-start="0" data-duration="11.5" data-track-index="1" data-layout-allow-overflow>
        <div class="ui-streams" data-layout-allow-overflow>
          <div class="stream stream-a">
            <div class="screen"><img src="assets/1.png" alt="" /></div>
            <div class="screen"><img src="assets/3.png" alt="" /></div>
            <div class="screen"><img src="assets/5.png" alt="" /></div>
            <div class="screen"><img src="assets/25-copy.png" alt="" /></div>
          </div>
          <div class="stream stream-b">
            <div class="screen"><img src="assets/7.png" alt="" /></div>
            <div class="screen"><img src="assets/8.png" alt="" /></div>
            <div class="screen"><img src="assets/9.png" alt="" /></div>
            <div class="screen"><img src="assets/11-copy.png" alt="" /></div>
          </div>
          <div class="stream stream-c">
            <div class="screen"><img src="assets/11.png" alt="" /></div>
            <div class="screen"><img src="assets/14.png" alt="" /></div>
            <div class="screen"><img src="assets/15.png" alt="" /></div>
            <div class="screen"><img src="assets/16-copy.png" alt="" /></div>
          </div>
          <div class="stream stream-d">
            <div class="screen"><img src="assets/16.png" alt="" /></div>
            <div class="screen"><img src="assets/20.png" alt="" /></div>
            <div class="screen"><img src="assets/24.png" alt="" /></div>
            <div class="screen"><img src="assets/25.png" alt="" /></div>
          </div>
          <div class="stream stream-e">
            <div class="screen"><img src="assets/3-copy.png" alt="" /></div>
            <div class="screen"><img src="assets/8-copy.png" alt="" /></div>
            <div class="screen"><img src="assets/14-copy.png" alt="" /></div>
            <div class="screen"><img src="assets/20-copy.png" alt="" /></div>
          </div>
        </div>

        <div class="brand-stage">
          <div class="brand-card">
            <div class="brand-logo-window"><img class="brand-logo" src="assets/28.png" alt="TEMU" /></div>
            <h1 class="brand-word" aria-label="TEMU"><span class="brand-letter">T</span><span class="brand-letter">E</span><span class="brand-letter">M</span><span class="brand-letter">U</span></h1>
          </div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.inOut" } });

      tl.fromTo(".ui-streams", { opacity: 0, scale: 1.01 }, { opacity: 1, scale: 1.01, duration: .5, ease: "power2.out" }, 0)
        .fromTo(".stream-a", { y: 180 }, { y: -440, duration: 8, ease: "none" }, 0)
        .fromTo(".stream-b", { y: -620 }, { y: 20, duration: 8, ease: "none" }, 0)
        .fromTo(".stream-c", { y: 180 }, { y: -440, duration: 8, ease: "none" }, 0)
        .fromTo(".stream-d", { y: -620 }, { y: 20, duration: 8, ease: "none" }, 0)
        .fromTo(".stream-e", { y: 180 }, { y: -440, duration: 8, ease: "none" }, 0)
        .to(".ui-streams", { opacity: 0, scale: 1.02, duration: .7, ease: "power3.in" }, 7.4)

        .set(".brand-stage", { opacity: 1 }, 8.15)
        .from(".brand-logo-window", { opacity: 0, scale: .82, duration: .7, ease: "power4.out" }, 8.15)
        .to(".brand-letter", { opacity: 1, y: 0, duration: .38, stagger: .14, ease: "power3.out", startAt: { y: 24 } }, 8.52)
        .to(".brand-stage", { opacity: 0, duration: .55, ease: "power2.in" }, 10.9);

      window.__timelines.main = tl;
    </script>
  </body>
</html>
